<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Feedback System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center min-vh-100 py-5">
    <div id="loader" class="spinner-overlay hidden">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="container animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="text-decoration-none text-white d-inline-flex mb-3">
                            <i class="fa-solid fa-graduation-cap fa-2x text-primary me-2"></i>
                            <h2 class="fw-bold mb-0">EduFeedback</h2>
                        </a>
                        <p class="text-white">Welcome back. Please login to your account.</p>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label">Registration ID</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary text-white">
                                    <i class="fa-regular fa-id-card"></i>
                                </span>
                                <input type="text" id="loginRegId" name="loginRegId" class="form-control border-start-0 ps-0" placeholder="Enter Registration ID" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary text-white">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input type="password" id="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                                <label class="form-check-label text-white" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" id="forgotPasswordLink" class="text-primary text-decoration-none text-sm fw-semibold">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 shadow-lg fs-5 mb-4">
                            <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In
                        </button>

                        <p class="text-center mb-0 text-white">
                            Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-semibold">Sign Up</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
