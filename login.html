
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Student Feedback System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center min-vh-100 py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card p-5 shadow">

                <div class="text-center mb-5">
                    <h2 class="fw-bold mb-0">EduFeedback</h2>
                    <p>Welcome back. Please login to your account.</p>
                </div>

                <form id="loginForm">

                    <div class="mb-4">
                        <label class="form-label">Registration ID</label>
                        <input type="text" id="loginRegId" name="loginRegId" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fs-5 mb-4">
                        Sign In
                    </button>

                    <p class="text-center mb-0">
                        Don't have an account?
                        <a href="register.html" class="fw-semibold">Sign Up</a>
                    </p>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
