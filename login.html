<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - STUDΞNT Feedback</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="centered">
<div class="auth-container">
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-meteor"></i>
        </div>
        <h2>STUDΞNT Login</h2>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username">
                <span class="error" id="userErr"></span>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <span class="error" id="passErr"></span>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="link">
            <a href="register.html">Don't have an account? Create one</a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){
    $("#loginForm").submit(function(e){
        e.preventDefault();

        let user = $("#username").val().trim();
        let pass = $("#password").val().trim();
        let valid = true;

        $(".error").text("");

        if(user === ""){
            $("#userErr").text("Username required");
            valid = false;
        }

        if(pass === ""){
            $("#passErr").text("Password required");
            valid = false;
        }

        if(valid){
            alert("Login Successful! Redirecting to homepage...");
            window.location.href = "homepage.html";
        }
    });
});
</script>
</body>
</html>
