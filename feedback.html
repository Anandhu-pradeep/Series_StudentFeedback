
<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="py-5">

<div class="container" style="max-width:800px;">

    <div class="card p-5 shadow">

        <h2 class="fw-bold mb-4">Evaluate Your Teacher</h2>

        <form id="feedbackForm">

            <div class="mb-4">
                <label class="form-label">Select Teacher</label>
                <select id="teacherSelect" name="teacherId" class="form-select" required></select>
            </div>

            <div class="mb-4">
                <label class="form-label">Select Subject</label>
                <select id="subjectSelect" name="subject" class="form-select" required>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Computer Science">Computer Science</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Rate Teaching Quality</label><br>
                <input type="radio" name="q1" value="1"> 1
                <input type="radio" name="q1" value="2"> 2
                <input type="radio" name="q1" value="3"> 3
                <input type="radio" name="q1" value="4"> 4
                <input type="radio" name="q1" value="5"> 5
            </div>

            <div class="mb-4">
                <label class="form-label">Additional Suggestions</label>
                <textarea id="suggestion" name="suggestion" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Submit Feedback
            </button>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
