<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <div id="loader" class="spinner-overlay hidden">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050"></div>

    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="glass-card modal-content border-0 p-4 shadow-lg text-white" style="background-color: var(--bg-color);">
                <div class="modal-header border-secondary mb-3">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-user-pen me-2 text-primary"></i> Edit Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label text-white">Registration ID</label>
                            <input type="text" id="profRegId" name="profRegId" class="form-control text-secondary" readonly style="background: rgba(255,255,255,0.02)">
                            <small class="text-secondary">Your ID cannot be changed.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">Full Name</label>
                            <input type="text" id="profFullName" name="profFullName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">Email Address</label>
                            <input type="email" id="profEmail" name="profEmail" class="form-control" required>
                        </div>
                        <div class="mb-3" id="profYearContainer">
                            <label class="form-label text-white">Year</label>
                            <select id="profYear" name="profYear" class="form-select">
                                <option value="1">1st Year</option>
                                <option value="2">2nd Year</option>
                                <option value="3">3rd Year</option>
                                <option value="4">4th Year</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-white">Update Password</label>
                            <input type="text" id="profPassword" name="profPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav mb-5 py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-graduation-cap me-2"></i>EduFeedback
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <span class="navbar-text ms-auto text-white fw-semibold me-4">
                    Welcome, <span id="studentName" class="text-primary"></span> 👋
                </span>
                <ul class="navbar-nav">
                    <li class="nav-item me-2 mt-2 mt-lg-0">
                        <button class="btn btn-outline-info rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#profileModal">
                            <i class="fa-solid fa-user me-2"></i> Profile
                        </button>
                    </li>
                    <li class="nav-item mt-2 mt-lg-0">
                        <button class="btn btn-outline-light rounded-pill px-4" data-action="logout">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-4 flex-grow-1 animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-secondary pb-3">
            <h2 class="fw-bold m-0"><i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i> My Recent Reviews</h2>
            <a href="feedback.html" class="btn btn-primary rounded-pill px-4 shadow">
                <i class="fa-solid fa-plus me-2"></i> New Review
            </a>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="reviewsList">
            <!-- Reviews will be populated here -->
        </div>

        <!-- No Data State -->
        <div id="noReviews" class="text-center py-5 hidden">
            <i class="fa-regular fa-folder-open fa-4x text-muted mb-3"></i>
            <h4 class="text-white">No reviews submitted yet</h4>
            <p class="text-secondary">When you rate a teacher, your reviews will securely appear here.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0 text-muted">&copy; 2026 Student Feedback System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    
    <script>
        $(document).ready(function() {
            // Check session and get user
            const user = checkSession('Student');
            if (user) {
                $('#studentName').text(user.fullName);
                loadReviews(user.id);
            }

            function loadReviews(studentId) {
                const $list = $('#reviewsList');
                $list.empty();
                
                $.ajax({
                    url: 'api_get_feedbacks.php',
                    type: 'GET',
                    data: { studentId: studentId },
                    success: function(response) {
                        if (!response.success || !response.feedbacks || response.feedbacks.length === 0) {
                            $('#noReviews').removeClass('hidden');
                            return;
                        }
                        
                        response.feedbacks.forEach(feedback => {
                            const teacherName = feedback.teacherName;
                            const subject = feedback.subject;
                            
                            let totalRating = 0;
                            feedback.ratings.forEach(val => totalRating += (parseInt(val) || 0));
                            const avgRating = (totalRating / 9).toFixed(1);
                            
                            const cardDate = new Date(feedback.date).toLocaleDateString();

                            const html = `
                                <div class="col">
                                    <div class="glass-card h-100 p-4 position-relative overflow-hidden" style="transition: all 0.3s ease;">
                                        <div class="position-absolute top-0 end-0 p-3">
                                            <span class="badge bg-secondary bg-opacity-25 text-white border border-secondary">${cardDate}</span>
                                        </div>
                                        <div class="d-flex flex-column mb-3 pt-2">
                                            <span class="badge bg-primary text-white d-inline-block align-self-start mb-2">${subject}</span>
                                            <h5 class="fw-bold mb-1 text-white">Prof. ${teacherName}</h5>
                                        </div>
                                        
                                        <div class="d-flex align-items-center mb-3 p-3 rounded" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                                            <div class="me-3">
                                                <h2 class="mb-0 text-primary fw-bold">${avgRating}<span class="fs-5 text-secondary fw-normal">/5</span></h2>
                                            </div>
                                            <div>
                                                <div class="text-warning fs-6">
                                                    ${Array.from({length: 5}, (_, i) => `<i class="fa-solid fa-star ${i < Math.round(avgRating) ? '' : 'text-secondary opacity-50'}"></i>`).join('')}
                                                </div>
                                                <div class="text-secondary text-sm">Overall Score</div>
                                            </div>
                                        </div>
                                        
                                        ${feedback.suggestion ? `
                                            <div class="text-secondary text-sm mt-3 pt-3 border-top border-secondary opacity-75 fst-italic">
                                                "${feedback.suggestion}"
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                            $list.append(html);
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
