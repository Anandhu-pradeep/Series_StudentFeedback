

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Student Feedback System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="py-5">

<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card col-md-8 col-lg-6 p-5 w-100 shadow">

        <div class="text-center mb-4">
            <h2 class="fw-bold mb-0">EduFeedback</h2>
            <p>Create your account to get started.</p>
        </div>

        <form id="registerForm">
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Register Number</label>
                    <input type="text" id="regNumber" name="regNumber" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select id="role" name="role" class="form-select" required>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Year</label>
                    <select id="year" name="year" class="form-select">
                        <option value="">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                </div>

            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary w-100 py-3">
                    Register
                </button>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
