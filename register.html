<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Feedback System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="spinner-overlay hidden">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5 animate-fade-in">
        <div class="glass-card col-md-8 col-lg-6 p-5 w-100">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none text-white d-inline-flex mb-3">
                    <i class="fa-solid fa-graduation-cap fa-2x text-primary me-2"></i>
                    <h2 class="fw-bold mb-0">EduFeedback</h2>
                </a>
                <p class="text-white">Create your account to get started.</p>
            </div>

            <div id="alertContainer"></div>

            <form id="registerForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" name="fullName" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="col-md-6" id="regNumberContainer">
                        <label class="form-label" id="regNumberLabel">Register Number</label>
                        <input type="text" id="regNumber" name="regNumber" class="form-control" placeholder="CS202601" required>
                    </div>
                    <div class="col-md-6 d-none">
                        <label class="form-label">Role</label>
                        <select id="role" name="role" class="form-select" required>
                            <option value="Student" selected>Student</option>
                        </select>
                    </div>
                    <div class="col-md-6" id="yearContainer">
                        <label class="form-label">Year</label>
                        <select id="year" name="year" class="form-select" required>
                            <option value="">Select Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="mt-4 pt-2">
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 shadow-lg fs-5">
                        <i class="fa-solid fa-user-plus me-2"></i> Register
                    </button>
                    <p class="text-center mt-4 mb-0 text-white">
                        Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-semibold">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
