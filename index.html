<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Portal - SPACΞD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="centered">
    <div class="feedback-container">
        <header>
            <div class="logo">
                <i class="fas fa-meteor"></i>
            </div>
            <h1>Feedback Portal</h1>
            <p class="subtitle">Submit Your Cosmos-Level Feedback Here</p>
        </header>

        <main class="feedback-card">
            <form id="feedbackForm" class="feedback-form">
                <div class="form-group">
                    <label for="studentName"><i class="fas fa-user-astronaut"></i> Student Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="Enter your full name" required>
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="studentEmail"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="studentEmail" name="studentEmail" placeholder="Enter your email" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="course"><i class="fas fa-book"></i> Course/Subject</label>
                    <select id="course" name="course" required>
                        <option value="" disabled selected>Select your course</option>
                        <option value="computer-fundamentals">Computer Fundamentals</option>
                        <option value="web-development">Web Development (AWT)</option>
                        <option value="data-structures">Data Structures</option>
                        <option value="database-management">Database Management</option>
                        <option value="computer-networks">Computer Networks</option>
                        <option value="software-engineering">Software Engineering</option>
                        <option value="mathematics">Mathematics</option>
                        <option value="english">English Communication</option>
                        <option value="other">Other</option>
                    </select>
                    <input type="text" id="otherCourse" name="otherCourse" placeholder="Please specify your course" style="display: none; margin-top: 10px;">
                    <span class="error-message" id="courseError"></span>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-star"></i> Component Rating</label>
                    <div class="rating-container">
                        <div class="star-rating" id="starRating">
                            <i class="far fa-star" data-rating="1"></i>
                            <i class="far fa-star" data-rating="2"></i>
                            <i class="far fa-star" data-rating="3"></i>
                            <i class="far fa-star" data-rating="4"></i>
                            <i class="far fa-star" data-rating="5"></i>
                        </div>
                        <input type="hidden" id="rating" name="rating" value="0">
                        <span class="rating-text" id="ratingText">Click to rate</span>
                    </div>
                    <span class="error-message" id="ratingError"></span>
                </div>

                <div class="form-group">
                    <label for="comments"><i class="fas fa-pencil-alt"></i> Feedback Comments</label>
                    <textarea id="comments" name="comments" placeholder="Share your thoughts about the course, teaching quality, and suggestions for improvement..." rows="4" required></textarea>
                    <span class="char-count"><span id="charCount">0</span>/500 characters</span>
                    <span class="error-message" id="commentsError"></span>
                </div>

                <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Submit Feedback</button>
                <div class="link" style="margin-top: 1rem; display: flex; justify-content: space-between;">
                    <a href="homepage.html">← Go Back</a>
                    <a href="javascript:void(0)" id="viewFeedbackBtn">View Feedback →</a>
                </div>
            </form>

            <div class="success-message" id="successMessage">
                <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                <h2>Thank You!</h2>
                <p>Your feedback has been successfully captured in our system.</p>
                <button class="submit-btn" id="successViewBtn" style="margin-bottom: 15px;"><i class="fas fa-list"></i> View All Feedbacks</button>
                <button class="reset-btn" id="resetBtn" style="width: 100%;"><i class="fas fa-redo"></i> Submit Another Feedback</button>
            </div>
            
            <!-- View Feedbacks Section -->
            <div id="feedbackDisplayArea" style="display: none; padding-top: 10px;">
                <h2 style="color: var(--accent); margin-bottom: 1.5rem;"><i class="fas fa-inbox"></i> Submitted Feedbacks</h2>
                <div id="feedbacksContent" style="display: flex; flex-direction: column;">
                    <!-- Javascript will populate this array -->
                </div>
                <div class="link" style="margin-top: 2rem; text-align: center;">
                    <a href="javascript:void(0)" id="backToFormBtn" style="font-size: 1.1rem; color: var(--accent);">← Back to Form</a>
                </div>
            </div>
        </main>
    </div>

    <script>
// Array to store previous feedbacks during runtime
const allFeedbacks = [];

// DOM Elements
const feedbackForm = document.getElementById('feedbackForm');
const successMessage = document.getElementById('successMessage');
const feedbackDisplayArea = document.getElementById('feedbackDisplayArea');
const feedbacksContent = document.getElementById('feedbacksContent');

const resetBtn = document.getElementById('resetBtn');
const viewFeedbackBtn = document.getElementById('viewFeedbackBtn');
const backToFormBtn = document.getElementById('backToFormBtn');
const successViewBtn = document.getElementById('successViewBtn');

const starRating = document.getElementById('starRating');
const stars = starRating.querySelectorAll('i');
const ratingInput = document.getElementById('rating');
const ratingText = document.getElementById('ratingText');
const commentsTextarea = document.getElementById('comments');
const charCount = document.getElementById('charCount');

// Rating labels
const ratingLabels = ['Click to rate', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];

// Initialize star rating
function initStarRating() {
    stars.forEach(star => {
        star.addEventListener('click', () => setRating(parseInt(star.getAttribute('data-rating'))));
        star.addEventListener('mouseenter', () => highlightStars(parseInt(star.getAttribute('data-rating'))));
    });
    starRating.addEventListener('mouseleave', () => highlightStars(parseInt(ratingInput.value)));
}

function highlightStars(rating) {
    stars.forEach(star => {
        const starRating = parseInt(star.getAttribute('data-rating'));
        if (starRating <= rating) {
            star.classList.remove('far');
            star.classList.add('fas');
        } else {
            star.classList.remove('fas');
            star.classList.add('far');
        }
    });
}

function setRating(rating) {
    ratingInput.value = rating;
    ratingText.textContent = ratingLabels[rating];
    ratingText.style.color = rating > 0 ? '#f59e0b' : '#64748b';
    const ratingError = document.getElementById('ratingError');
    if (ratingError) ratingError.textContent = '';
    highlightStars(rating);
}

function initCharCount() {
    commentsTextarea.addEventListener('input', () => {
        const currentLength = commentsTextarea.value.length;
        charCount.textContent = currentLength;
        if (currentLength > 450) charCount.parentElement.style.color = '#ef4444';
        else if (currentLength > 400) charCount.parentElement.style.color = '#f59e0b';
        else charCount.parentElement.style.color = '#94a3b8';
        if (currentLength >= 500) {
            commentsTextarea.value = commentsTextarea.value.substring(0, 500);
            charCount.textContent = 500;
        }
    });
}

function validateForm() {
    let isValid = true;
    const name = document.getElementById('studentName').value.trim();
    const email = document.getElementById('studentEmail').value.trim();
    const course = document.getElementById('course').value;
    const rating = parseInt(ratingInput.value);
    const comments = commentsTextarea.value.trim();
    
    const nameError = document.getElementById('nameError');
    if (!name || name.length < 2) {
        nameError.textContent = 'Please enter a valid name';
        document.getElementById('studentName').classList.add('error');
        isValid = false;
    } else {
        nameError.textContent = '';
        document.getElementById('studentName').classList.remove('error');
    }
    
    const emailError = document.getElementById('emailError');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !emailRegex.test(email)) {
        emailError.textContent = 'Please enter a valid email';
        document.getElementById('studentEmail').classList.add('error');
        isValid = false;
    } else {
        emailError.textContent = '';
        document.getElementById('studentEmail').classList.remove('error');
    }
    
    if (!course) {
        document.getElementById('courseError').textContent = 'Please select a course';
        isValid = false;
    } else {
        document.getElementById('courseError').textContent = '';
    }
    
    if (rating === 0) {
        document.getElementById('ratingError').textContent = 'Please select a rating';
        isValid = false;
    } else {
        document.getElementById('ratingError').textContent = '';
    }
    
    if (!comments || comments.length < 10) {
        document.getElementById('commentsError').textContent = 'Feedback must be at least 10 characters';
        isValid = false;
    } else {
        document.getElementById('commentsError').textContent = '';
    }
    return isValid;
}

function handleSubmit(e) {
    e.preventDefault();
    if (!validateForm()) return;
    
    // Push the submission to the array
    allFeedbacks.push({
        name: document.getElementById('studentName').value.trim(),
        email: document.getElementById('studentEmail').value.trim(),
        course: document.getElementById('course').value,
        rating: parseInt(ratingInput.value),
        comments: commentsTextarea.value.trim()
    });
    
    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
    
    setTimeout(() => {
        feedbackForm.classList.add('hidden');
        feedbackForm.style.display = 'none';
        successMessage.classList.add('show');
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Feedback';
    }, 1000);
}

function renderFeedbacks() {
    feedbacksContent.innerHTML = '';
    
    if (allFeedbacks.length === 0) {
        feedbacksContent.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding: 2rem 0;">No feedbacks have been submitted yet.</p>';
        return;
    }
    
    // Render newest feedback at the top
    for(let i = allFeedbacks.length - 1; i >= 0; i--) {
        const fb = allFeedbacks[i];
        
        // Convert number rating to star icons
        let starsHtml = '';
        for(let j=1; j<=5; j++) {
            if(j <= fb.rating) {
                starsHtml += '<i class="fas fa-star" style="color:#f59e0b"></i>';
            } else {
                starsHtml += '<i class="far fa-star" style="color:rgba(255,255,255,0.2)"></i>';
            }
        }
        
        // Format course name to be more readable
        const readableCourse = fb.course.split('-').map(word => document.documentElement.style.textTransform = 'capitalize' ? word.charAt(0).toUpperCase() + word.slice(1) : word).join(' ');

        // Create the cosmic feedback card
        const cardDiv = document.createElement('div');
        cardDiv.style.background = 'rgba(255, 255, 255, 0.05)';
        cardDiv.style.border = '1px solid rgba(255, 255, 255, 0.1)';
        cardDiv.style.borderRadius = '12px';
        cardDiv.style.padding = '1.5rem';
        cardDiv.style.marginTop = '1rem';
        cardDiv.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
        
        cardDiv.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                <div>
                    <h3 style="font-size: 1.2rem; margin-bottom: 2px; color: var(--accent); text-align: left;">${fb.name}</h3>
                    <div style="font-size:0.85rem; color:rgba(255,255,255,0.6); text-align: left; margin-bottom: 5px;">
                        <i class="fas fa-book" style="margin-right: 5px;"></i>${readableCourse}
                    </div>
                </div>
                <div style="font-size: 1.1rem;">${starsHtml}</div>
            </div>
            <p style="color: #e2e8f0; font-size: 0.95rem; margin-top: 0.8rem; line-height: 1.6; text-align: left; font-style: italic;">"${fb.comments}"</p>
        `;
        
        feedbacksContent.appendChild(cardDiv);
    }
}

function showFeedbacksList() {
    feedbackForm.style.display = 'none';
    successMessage.classList.remove('show');
    feedbackDisplayArea.style.display = 'block';
    renderFeedbacks();
}

function showForm() {
    feedbackDisplayArea.style.display = 'none';
    successMessage.classList.remove('show');
    feedbackForm.style.display = 'block';
    feedbackForm.classList.remove('hidden');
}

function resetForm() {
    feedbackForm.reset();
    ratingInput.value = 0;
    charCount.textContent = '0';
    ratingText.textContent = 'Click to rate';
    ratingText.style.color = '#64748b';
    stars.forEach(star => {
        star.classList.remove('fas');
        star.classList.add('far');
    });
    
    // Clear all errors
    document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
    document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
    
    // Switch view back to form
    showForm();
}

document.addEventListener('DOMContentLoaded', () => {
    initStarRating();
    initCharCount();
    
    // Clear errors on input
    feedbackForm.querySelectorAll('input, select, textarea').forEach(input => {
        input.addEventListener('input', () => {
             input.classList.remove('error');
             const errorEl = input.parentElement.querySelector('.error-message');
             if(errorEl) errorEl.textContent = '';
        });
    });

    feedbackForm.addEventListener('submit', handleSubmit);
    resetBtn.addEventListener('click', resetForm);
    
    // View Feedback Navigations
    viewFeedbackBtn.addEventListener('click', showFeedbacksList);
    successViewBtn.addEventListener('click', showFeedbacksList);
    backToFormBtn.addEventListener('click', showForm);
});
    </script>
</body>
</html>
